; ╔══════════════════════════════════════════════════════════════╗
; ║  EzRover Pro — platformio.ini                               ║
; ║  VS Code + PlatformIO + ESP32 via USB                       ║
; ╚══════════════════════════════════════════════════════════════╝

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; ─── Upload qua USB ────────────────────────────────────────────
; PlatformIO tự detect cổng COM/ttyUSB.
; Nếu có nhiều cổng, bỏ comment dòng dưới và chỉ định đúng cổng:
; upload_port = COM3          ; Windows
; upload_port = /dev/ttyUSB0  ; Linux
; upload_port = /dev/cu.usbserial-0001  ; macOS
upload_port   = COM13
upload_speed  = 460800
upload_protocol = esptool

upload_flags =
    --no-stub
    --before
    default_reset
    --after
    hard_reset

monitor_port  = COM13
monitor_speed = 115200

; ─── Partition: cần đủ chỗ cho web app nhúng vào firmware ─────
board_build.partitions = min_spiffs.csv

; ─── Thư viện ──────────────────────────────────────────────────
lib_deps =
    ; WebSocket server (Markus Sattler)
    links2004/WebSockets @ ^2.4.1

    ; JSON parse/serialize
    bblanchon/ArduinoJson @ ^6.21.5

    ; Servo cho ESP32 (thay thế Servo.h chuẩn)
    madhephaestus/ESP32Servo @ ^3.0.5

    ; LCD 16x2 I2C
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4

; ─── Build flags ───────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=0

; ─── Monitor filter: bật màu, tự scroll ───────────────────────
monitor_filters = esp32_exception_decoder, colorize
